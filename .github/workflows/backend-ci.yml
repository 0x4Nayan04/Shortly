name: Backend CI

on:
  pull_request:
    paths:
      - 'BACKEND/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches: [main]
    paths:
      - 'BACKEND/**'
      - '.github/workflows/backend-ci.yml'

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BACKEND
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: BACKEND/package-lock.json
      - run: npm ci
      - run: npm run ci
      - run: npm run audit
